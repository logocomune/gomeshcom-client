openapi: 3.0.3
info:
  title: gomeshcomd API
  version: 0.6.0
  description: |
    HTTP and Server-Sent Events API exposed by gomeshcomd.
    Static frontend routes are served by the same HTTP listener but are not
    part of this API contract.
servers:
  - url: http://127.0.0.1:8080
    description: Default local server
tags:
  - name: Health
    description: Service health
  - name: Session
    description: Authentication session management
  - name: Messages
    description: Outgoing MeshCom messages
  - name: Positions
    description: Persisted MeshCom node positions
  - name: Events
    description: Server-Sent Events stream
  - name: Channels
    description: Frontend channel visibility preferences
  - name: Chat
    description: Disk-backed chat history
paths:
  /api/session:
    get:
      tags: [Session]
      summary: Return authentication status
      description: |
        Returns whether authentication is required and whether the current
        request carries a valid session cookie. This endpoint is always
        accessible — it does not require a valid session.

        When authentication is required but the caller is not authenticated,
        returns `401` with `authenticated: false` so clients can distinguish
        "auth disabled" from "auth required but not logged in".
      operationId: getSession
      responses:
        "200":
          description: Authentication is disabled or caller is authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatus"
              examples:
                authDisabled:
                  value:
                    required: false
                    authenticated: true
                authenticated:
                  value:
                    required: true
                    authenticated: true
        "401":
          description: Authentication is required and caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatus"
              examples:
                unauthenticated:
                  value:
                    required: true
                    authenticated: false
    post:
      tags: [Session]
      summary: Create a session (log in)
      description: |
        Validates username and password and sets an `HttpOnly` session cookie
        valid for `GOMESHCOM_AUTH_SESSION_TTL` (default `24h`). The cookie name
        is controlled by `GOMESHCOM_AUTH_COOKIE_NAME` (default
        `meshcom_session`). Request body is capped at 1 KB.

        When authentication is not configured, returns `204` immediately
        without reading the body.
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              login:
                value:
                  username: admin
                  password: secret
      responses:
        "204":
          description: Session created (or auth disabled — cookie set regardless).
          headers:
            Set-Cookie:
              description: Session cookie. HttpOnly, SameSite=Lax.
              schema:
                type: string
        "400":
          description: Invalid JSON body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Session token generation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Session]
      summary: Delete a session (log out)
      description: |
        Invalidates the current session token and clears the session cookie.
        Always returns `204`, even if no session is present or authentication is
        disabled.
      operationId: deleteSession
      responses:
        "204":
          description: Session invalidated (or auth disabled).
          headers:
            Set-Cookie:
              description: Expired session cookie (MaxAge=-1).
              schema:
                type: string
  /api/health:
    get:
      tags: [Health]
      summary: Return service health
      operationId: getHealth
      responses:
        "200":
          description: Service is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
  /api/messages:
    post:
      tags: [Messages]
      summary: Send an outgoing text message over UDP
      description: |
        Validates the request, suppresses immediate duplicates via the send
        cache, then sends the message through the configured UDP bridge. After
        accept, the server waits up to 5 seconds for the node echo; if none
        arrives, it persists a chat record with `delivery_status: failed` and
        emits `message.failed`.
      operationId: createMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
            examples:
              broadcast:
                value:
                  dst: "*"
                  msg: hello
      responses:
        "202":
          description: Message accepted for UDP send.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutgoingText"
        "400":
          description: Invalid JSON or invalid message fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidJson:
                  value:
                    error: invalid json
                emptyMessage:
                  value:
                    error: message is required
        "429":
          description: Duplicate message suppressed by send cache.
          headers:
            Retry-After:
              schema:
                type: string
              description: Seconds before retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateResponse"
        "502":
          description: UDP send failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: UDP bridge is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/positions:
    get:
      tags: [Positions]
      summary: Return persisted node positions
      operationId: listPositions
      responses:
        "200":
          description: Map keyed by source callsign.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/PositionRecord"
              examples:
                oneNode:
                  value:
                    QQ1ABC-1:
                      lat: 48.1
                      lng: 16.3
                      alt: 123
                      hw_id: "42"
                      firstseen: "2026-05-15T10:00:00Z"
                      lastseen: "2026-05-15T10:05:00Z"
                      lastdirectseen: "2026-05-15T10:05:00Z"
                      rssi: -90
                      snr: 8
                      via:
                        - QQ5AKT-10
                        - QQ5PFI-1
  /api/events:
    get:
      tags: [Events]
      summary: Stream live and replayed events
      description: |
        Opens a Server-Sent Events stream.

        The stream starts with a `heartbeat` event, then emits
        `station.identity`, optionally `positions.snapshot`,
        `chatstatus.snapshot` (unread counts per conversation), `channelshow.snapshot` (frontend channel visibility), then recent
        replayed `packet.received` events from the raw receive log, followed by
        live events. A `heartbeat` event is sent every 15 seconds. Failed
        outbound echo tracking emits `message.failed` with a `ChatRecord`
        payload.
      operationId: streamEvents
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                startup:
                  value: |
                    event: heartbeat
                    data: {}

                    event: station.identity
                    data: {"callsign":"QQ0XX-1"}

                    event: positions.snapshot
                    data: {}

                    event: chatstatus.snapshot
                    data: {"P_broadcast":{"lastMsgReceived":"2026-05-24T10:00:00Z","lastRead":"2026-05-24T09:55:00Z","unreadCount":3}}

                    event: channelshow.snapshot
                    data: {"mode":"allowlist","channels":["*","222"]}
        "500":
          description: Streaming unsupported by the response writer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/channel-show:
    get:
      tags: [Channels]
      summary: Return channel visibility preferences
      description: |
        Returns the frontend channel visibility preference. This preference is
        not applied to packet receive, logging, chat status, replay, or live SSE
        delivery; clients use it only to hide channel list entries.
      operationId: getChannelShow
      responses:
        "200":
          description: Current channel visibility preference.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelShowConfig"
              examples:
                all:
                  value:
                    mode: all
                    channels: []
                allowlist:
                  value:
                    mode: allowlist
                    channels: ["*", "222"]
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Channels]
      summary: Replace channel visibility preferences
      description: |
        Replaces the frontend channel visibility preference. The body may be a
        structured object or a raw channel array shorthand. Raw arrays are
        treated as `mode: allowlist`. Valid channels are `*` (Broadcast) and
        numeric channel IDs.
      operationId: updateChannelShow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelShowConfig"
            examples:
              all:
                value:
                  mode: all
                  channels: []
              allowlist:
                value:
                  mode: allowlist
                  channels: ["*", "222", "22201"]
              arrayShorthand:
                value: ["*", "222"]
      responses:
        "200":
          description: Normalized preference stored in memory and persisted on the next periodic save.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelShowConfig"
        "400":
          description: Invalid JSON, mode, or channel entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Channel visibility store is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chat/list:
    get:
      tags: [Chat]
      summary: List discovered chat conversations
      operationId: listConversations
      responses:
        "200":
          description: Conversation list sorted by last seen descending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
        "500":
          description: Chat log directory could not be read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/chat/{conversation}:
    get:
      tags: [Chat]
      summary: Return chat history for one conversation
      operationId: getConversation
      parameters:
        - name: conversation
          in: path
          required: true
          description: Conversation ID. Accepted forms are `P_broadcast`, `P_<channel>`, and `DM_<CALLSIGN>`.
          schema:
            type: string
            pattern: "^(\\*|\\d+)$"
          examples:
            broadcast:
              value: P_broadcast
            channel:
              value: P_262
            direct:
              value: DM_QQ1ABC-7
        - name: hours
          in: query
          required: false
          description: History window in hours. Defaults to server config for `P_broadcast`/`P_<channel>` and to 30 days for `DM_<CALLSIGN>`. Capped by server config.
          schema:
            type: number
            format: double
            exclusiveMinimum: true
            minimum: 0
      responses:
        "200":
          description: Chat records sorted ascending by receive time.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatRecord"
        "400":
          description: Invalid conversation ID or hours parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Chat history could not be read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Chat]
      summary: Delete chat history for one conversation
      description: |
        Removes the conversation JSONL file from disk. Also removes the
        corresponding entry from the in-memory chat status store and immediately
        persists `msg_idx.json`, so the conversation does not reappear as
        unread after a restart.
      operationId: deleteConversation
      parameters:
        - name: conversation
          in: path
          required: true
          description: Conversation ID.
          schema:
            type: string
            pattern: "^(\\*|\\d+)$"
      responses:
        "204":
          description: Conversation deleted successfully.
        "400":
          description: Invalid conversation ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Chatlog is disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Conversation could not be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/chat/{conversation}/read:
    post:
      tags: [Chat]
      summary: Mark a conversation as read
      description: |
        Zeroes the unread counter and sets `lastRead` for the given
        conversation. Idempotent — calling it when `unreadCount` is already 0
        is a no-op (still returns 204). The updated state is reflected in the
        next `chatstatus.snapshot` SSE event on a new connection.
      operationId: markConversationRead
      parameters:
        - name: conversation
          in: path
          required: true
          description: Conversation ID. Accepted forms are `P_broadcast`, `P_<channel>`, and `DM_<CALLSIGN>`.
          schema:
            type: string
            pattern: "^(\\*|\\d+)$"
          examples:
            broadcast:
              value: P_broadcast
            channel:
              value: P_262
            direct:
              value: DM_QQ1ABC-7
      responses:
        "204":
          description: Conversation marked as read.
        "400":
          description: Invalid conversation ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    SessionStatus:
      type: object
      required: [required, authenticated]
      properties:
        required:
          type: boolean
          description: True when `GOMESHCOM_AUTH_USERNAME` and `GOMESHCOM_AUTH_PASSWORD` are both set.
          example: true
        authenticated:
          type: boolean
          description: True when the request carries a valid, non-expired session cookie.
          example: false
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: secret
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid json
    DuplicateResponse:
      type: object
      required: [error, retry_after_ms]
      properties:
        error:
          type: string
          example: duplicate
        retry_after_ms:
          type: integer
          example: 2000
    CreateMessageRequest:
      type: object
      required: [dst, msg]
      properties:
        dst:
          type: string
          description: Destination callsign or group target. `*` means broadcast.
          example: "*"
        msg:
          type: string
          description: UTF-8 message text. Maximum length follows server config.
          example: hello
    OutgoingText:
      type: object
      required: [type, dst, msg]
      properties:
        type:
          $ref: "#/components/schemas/PacketType"
        dst:
          type: string
          example: "*"
        msg:
          type: string
          example: hello
    Conversation:
      type: object
      required: [id, kind, label, last_seen, size]
      properties:
        id:
          type: string
          example: DM_QQ1ABC-7
        kind:
          type: string
          enum: [broadcast, channel, dm]
          example: dm
        label:
          type: string
          example: QQ1ABC-7
        last_seen:
          type: string
          format: date-time
        size:
          type: integer
          format: int64
          example: 4096
    ChatRecord:
      type: object
      required: [received_at, msg]
      properties:
        received_at:
          type: string
          format: date-time
        src:
          type: string
          example: QQ1ABC-1
        src_type:
          type: string
          enum: [lora, udp, node]
        dst:
          type: string
          example: "*"
        msg_id:
          type: string
          example: 5DFC7187
        msg:
          type: string
          example: hello
        rssi:
          type: integer
          example: -95
        snr:
          type: integer
          example: 12
        direction:
          type: string
          enum: [outbound]
          example: outbound
        delivery_status:
          type: string
          enum: [failed]
          example: failed
    TextMessage:
      type: object
      required: [type, msg]
      properties:
        type:
          $ref: "#/components/schemas/PacketType"
        src:
          type: string
          example: QQ1ABC-1
        dst:
          type: string
          example: "*"
        msg:
          type: string
          example: hello
        msg_id:
          type: string
          example: 5DFC7187
        src_type:
          type: string
          enum: [lora, udp, node]
          example: lora
        firmware:
          oneOf:
            - type: string
            - type: number
          example: "4.35"
        fw_sub:
          oneOf:
            - type: string
            - type: number
          example: p
        rssi:
          type: integer
          example: -95
        snr:
          type: integer
          example: 12
    PositionRecord:
      type: object
      required: [lat, lng, alt, firstseen, lastseen, rssi, snr, via]
      properties:
        lat:
          type: number
          format: double
          example: 48.1
        lng:
          type: number
          format: double
          example: 16.3
        alt:
          type: integer
          example: 123
        hw_id:
          type: string
          example: "42"
        firstseen:
          type: string
          format: date-time
        lastseen:
          type: string
          format: date-time
        lastdirectseen:
          type: string
          format: date-time
        rssi:
          type: integer
          example: -90
        snr:
          type: integer
          example: 8
        via:
          type: array
          items:
            type: string
          example: [QQ5AKT-10, QQ5PFI-1]
    ChannelShowConfig:
      type: object
      required: [mode, channels]
      properties:
        mode:
          type: string
          enum: [all, allowlist]
          description: `all` shows every channel; `allowlist` shows only entries in `channels`.
          example: allowlist
        channels:
          type: array
          description: Channels visible when `mode` is `allowlist`. `*` means Broadcast; numeric strings mean public channels.
          items:
            type: string
            pattern: "^(\\*|\\d+)$"
          example: ["*", "222", "22201"]
    ChannelShowSnapshotEvent:
      allOf:
        - $ref: "#/components/schemas/ChannelShowConfig"
      description: |
        Frontend channel visibility preference emitted as `channelshow.snapshot`
        on every new `/api/events` connection. Backend packet receive, logging,
        chat status, replay, and live SSE delivery are not filtered by this setting.
    PacketReceivedEvent:
      type: object
      required: [remote_addr, packet]
      properties:
        remote_addr:
          type: string
          example: 192.168.0.2:1799
        packet:
          oneOf:
            - $ref: "#/components/schemas/TextMessage"
            - $ref: "#/components/schemas/PositionPacket"
            - $ref: "#/components/schemas/TelemetryPacket"
    StationIdentityEvent:
      type: object
      required: [callsign]
      properties:
        callsign:
          type: string
          example: QQ0XX-1
    PositionsSnapshotEvent:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/PositionRecord"
    PositionPacket:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/PacketType"
        src:
          type: string
        msg:
          type: string
        msg_id:
          type: string
        src_type:
          type: string
          enum: [lora, udp, node]
        lat:
          type: number
          format: double
        lat_dir:
          type: string
          enum: [N, S]
        long:
          type: number
          format: double
        long_dir:
          type: string
          enum: [E, W]
        aprs_symbol:
          type: string
        aprs_symbol_group:
          type: string
        hw_id:
          oneOf:
            - type: string
            - type: number
        alt:
          type: integer
        batt:
          type: integer
        firmware:
          oneOf:
            - type: string
            - type: number
        fw_sub:
          oneOf:
            - type: string
            - type: number
        rssi:
          type: integer
        snr:
          type: integer
    TelemetryPacket:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/PacketType"
        src:
          type: string
        src_type:
          type: string
          enum: [lora, udp, node]
        temp1:
          type: number
          format: double
        temp2:
          type: number
          format: double
        hum:
          type: number
          format: double
        batt:
          type: integer
        qfe:
          type: number
          format: double
        qnh:
          type: number
          format: double
        gas:
          type: number
          format: double
        co2:
          type: number
          format: double
    PacketType:
      type: string
      enum: [msg, pos, tele]
    ChatStatusEntry:
      type: object
      required: [lastMsgReceived, lastRead, unreadCount]
      properties:
        lastMsgReceived:
          type: string
          format: date-time
          description: Timestamp of the last received inbound message (not a self-echo). Zero value if no message received yet.
          example: "2026-05-24T10:00:00Z"
        lastRead:
          type: string
          format: date-time
          description: Timestamp of the last `POST /api/chat/{conversation}/read` call. Zero value if never read.
          example: "2026-05-24T09:55:00Z"
        unreadCount:
          type: integer
          minimum: 0
          description: Number of inbound messages since the last MarkRead call.
          example: 3
        lastMsg:
          type: string
          description: Raw text of the most recent inbound message. Omitted when no message has been received.
          example: hello world
    ChatStatusSnapshotEvent:
      type: object
      description: |
        Map keyed by conversation ID (`P_broadcast`, `P_<channel>`, `DM_<CALLSIGN>`)
        with the current read/unread state for each thread.
        Emitted as the `chatstatus.snapshot` SSE event on every new `/api/events` connection.
      additionalProperties:
        $ref: "#/components/schemas/ChatStatusEntry"
      example:
        P_broadcast:
          lastMsgReceived: "2026-05-24T10:00:00Z"
          lastRead: "2026-05-24T09:55:00Z"
          unreadCount: 3
        DM_QQ1ABC-7:
          lastMsgReceived: "2026-05-24T08:30:00Z"
          lastRead: "2026-05-24T08:30:00Z"
          unreadCount: 0
